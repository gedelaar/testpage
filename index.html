<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Test Website</title>


    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #0066cc;
            color: white;
            padding: 30px;
            text-align: center;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,.1);
        }

        img {
            width: 100%;
            max-width: 500px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        video {
            width: 100%;
            max-width: 700px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>

<body>

<header>
    <h1>Welkom op mijn website</h1>
    <p>Deze pagina draait op GitHub Pages.</p>
</header>

<main>

    <h2>Test afbeelding</h2>

    <img src="images/test.jpg" alt="Test afbeelding">

    <h2>Test video</h2>

    <video controls preload="metadata">
        <source src="videos/test.mp4" type="video/mp4">
        Je browser ondersteunt geen video.
    </video>

    <h2>Alles werkt!</h2>

    <p>
        Als je deze pagina ziet, dan is GitHub Pages correct ingesteld.
    </p>

</main>

<footer>
    © 2026 Mijn Website
</footer>

</body>
</html>
